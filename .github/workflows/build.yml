name: Build, Pack and Release MQOS-RV

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-pack:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install RISC-V Cross-Compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-riscv64-unknown-elf binutils-riscv64-unknown-elf

    - name: Compile OS Kernel
      run: |
        mkdir -p build
        make all

    - name: Prepare Release Package
      run: |
        mkdir -p mqos_release
        cp build/kernel mqos_release/
        cp scripts/run.sh mqos_release/
        cp scripts/run.bat mqos_release/
        chmod +x mqos_release/run.sh
        
        cd mqos_release && zip -r ../mqos-rv-bin.zip . && cd ..

    - name: Upload Finished Package to Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mqos-rv-bin
        path: mqos_release/

    - name: Publish to GitHub Releases
      if: startsWith(github.ref, 'refs/tags/')
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create ${{ github.ref_name }} mqos-rv-bin.zip \
          --title "mqos-rv ${{ github.ref_name }}" \
          --notes "Release of mqos rv64 kernel binaries. Run run.bat or run.sh"
